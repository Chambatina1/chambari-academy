services:
  - type: web
    name: chambari-academy
    runtime: node
    buildCommand: bun install && bun run db:push
    startCommand: bun run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chambari-db
          property: connectionString

databases:
  - name: chambari-db
    databaseName: chambari_academy
    plan: free
