services:
  - type: web
    name: chambari-academy
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npx next start -p 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chambari-db
          property: connectionString

databases:
  - name: chambari-db
    databaseName: chambari_academy
    plan: free
